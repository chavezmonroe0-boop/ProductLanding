<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>100615 Product Details</title>

  <link rel="stylesheet" href="styles.css" />

  <!-- Use the product-page script that exists in your repo -->
  <script defer src="product-page.txt"></script>

  <style>
    /* Full-page background like your index page */
    html, body { height: 100%; }
    body {
      background: #000 url("backgroundlp.png") center/cover no-repeat fixed;
      padding-top: 56px; /* fixed header offset */
    }

    /* Brand logo sizing */
    .brand a { display: inline-flex; align-items: center; }
    .brand img { height: 22px; width: auto; display: block; }

    /* --- Fix header scrollbars caused by .menu { overflow-x:auto } in styles.css --- */
    .menu { overflow-x: auto; overflow-y: hidden; scrollbar-width: none; }
    .menu::-webkit-scrollbar { height: 0; }

    /* Pipe separator */
    .menu .menu-sep {
      color: #111;
      opacity: 0.35;
      padding: 0 10px;
      user-select: none;
      line-height: 1;
    }

    /* Keep your existing page content simple (no redesign) */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 18px 16px 48px;
      color: #fff; /* readable over background */
      text-shadow: 0 2px 6px rgba(0,0,0,0.55);
    }

    /* Optional: make the details block readable */
    .details-box {
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 14px 16px;
      max-width: 560px;
    }

    img#productImage {
      max-width: 360px;
      width: 100%;
      height: auto;
      border-radius: 12px;
      background: rgba(255,255,255,0.85);
      display: block;
      margin-top: 12px;
    }

    .hidden { display: none; }
  </style>
  <script defer src="product-page.js"></script>
</head>

<body>
  <!-- Header matches your latest index menu (no SCAN BARCODE in header) -->
  <header class="topbar">
    <div class="brand">
      <a href="index.html" aria-label="Home">
        <img src="carhartt-logo.png" alt="carhartt" />
      </a>
    </div>

    <nav class="menu">
      <a href="#">New</a>
      <a href="#">Featured</a>
      <a href="#">Men</a>
      <a href="#">Women</a>
      <a href="#">Kids</a>
      <a href="#">Scrubs</a>
      <a href="#">Boots</a>
      <a href="#">Accesories</a>
      <a href="#">Sale</a>
      <a href="#">Learn</a>

      <span class="menu-sep" aria-hidden="true">|</span>
      <a href="index.html">My Product</a>
    </nav>
  </header>

  <!-- Leave the body layout simple; product-page.txt will populate these IDs -->
  <main>
    <h2 id="productTitle">Loading…</h2>
    <p id="productMeta"></p>

    <img id="productImage" alt="Product image" />

    <h3>Details</h3>
    <div class="details-box">
      <p><strong>Materials:</strong> <span id="materials"></span></p>
      <p><strong>Care:</strong> <span id="care"></span></p>
      <p><strong>COO:</strong> <span id="coo"></span></p>
      <p><strong>PO:</strong> <span id="po"></span></p>
      <p><strong>Style:</strong> <span id="style"></span></p>
      <p><strong>Description:</strong> <span id="description"></span></p>
    </div>

    <p id="pageError" class="hidden"></p>
    <pre id="recordDump" class="hidden"></pre>
  </main>
</body>
</html>
