<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Conveyor Loop Animation</title>
  <style>
    body { background: #f0f0f0; font-family: sans-serif; }
    #conveyor { position: relative; width: 600px; height: 300px; margin: 50px auto; border: 2px dashed #333; border-radius: 50%; }
    .box {
      width: 40px; height: 40px;
      background: brown;
      position: absolute;
      top: 130px; left: 280px;
      border-radius: 5px;
      animation: loop 8s linear infinite;
    }
    @keyframes loop {
      0%   { top: 130px; left: 280px; }
      25%  { top: 50px; left: 300px; }
      50%  { top: 130px; left: 520px; }
      60%  { top: 180px; left: 550px; } /* divert to trauma */
      70%  { top: 180px; left: 520px; } /* pushed back */
      85%  { top: 250px; left: 300px; }
      100% { top: 130px; left: 280px; }
    }
    #trauma {
      position: absolute;
      top: 180px; left: 550px;
      width: 80px; height: 40px;
      background: red;
      color: white;
      text-align: center;
      line-height: 40px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="conveyor">
    <div class="box"></div>
    <div id="trauma">TRAUMA</div>
  </div>
</body>
</html>
