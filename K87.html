<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>K87 Product Details</title>

  <link rel="stylesheet" href="styles.css" />
  <script defer src="product-page.js"></script>

  <style>
    /* Full-page background like your index approach */
    html, body { height: 100%; }
    body {
      background: #000 url("backgroundlp.png") center/cover no-repeat fixed;
      padding-top: 56px; /* fixed header height from styles.css */
    }

    /* Hide header scrollbars while still allowing horizontal scroll on small screens */
    .menu { overflow-x: auto; overflow-y: hidden; scrollbar-width: none; }
    .menu::-webkit-scrollbar { height: 0; }

    /* Logo sizing */
    .brand a { display: inline-flex; align-items: center; }
    .brand img { height: 22px; width: auto; display: block; }

    /* Pipe separator */
    .menu .menu-sep {
      color: #111;
      opacity: 0.35;
      padding: 0 10px;
      user-select: none;
      line-height: 1;
    }

    /* ---- Responsive Product Layout ---- */
    .product-wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 18px 16px 48px;
      color: #fff;
      text-shadow: 0 2px 6px rgba(0,0,0,0.55);
    }

    .product-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 18px;
      align-items: start;
    }

    .card {
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 14px 16px;
    }

    #productImage {
      width: 100%;
      height: auto;
      border-radius: 12px;
      background: rgba(255,255,255,0.85);
      display: block;
      object-fit: cover;
    }

    .title {
      margin: 0 0 8px;
      font-size: clamp(22px, 4vw, 34px);
      line-height: 1.1;
    }

    .meta {
      margin: 0 0 12px;
      opacity: 0.95;
      font-size: 14px;
    }

    .details-grid {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 10px 12px;
      margin-top: 10px;
    }
    .details-grid .k {
      font-weight: 800;
      opacity: 0.95;
    }
    .details-grid .v {
      opacity: 0.95;
      word-break: break-word;
    }

    /* Error block (product-page.js uses #pageError) */
    .hidden { display: none; }
    #pageError {
      margin-top: 10px;
      font-weight: 800;
      color: #ffb4b4;
    }

    /* ---- Mobile adjustments ---- */
    @media (max-width: 820px) {
      .product-layout {
        grid-template-columns: 1fr;
      }

      /* Put image first on mobile */
      .image-card { order: 0; }
      .info-card { order: 1; }

      .details-grid {
        grid-template-columns: 95px 1fr;
      }
    }

    /* Make the details grid look like a table (grid lines + aligned rows) */
.details-grid {
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 10px;
  overflow: hidden; /* ensures borders stay clean with rounded corners */
}

/* Style each cell */
.details-grid > .k,
.details-grid > .v {
  padding: 10px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.14);
  line-height: 1.25;
  align-self: stretch; /* ensures both cells fill row height */
}

/* Remove bottom border from the last row’s two cells */
.details-grid > div:nth-last-child(-n+2) {
  border-bottom: none;
}

/* Vertical divider between label and value columns */
.details-grid > div:nth-child(odd) {
  border-right: 1px solid rgba(255,255,255,0.14);
}

/* Subtle shading for the label column to help tracking across rows */
.details-grid > .k {
  background: rgba(255,255,255,0.06);
  font-weight: 800;
}

/* Optional: make values slightly easier to read */
.details-grid > .v {
  background: rgba(0,0,0,0.08);
}

    
/* Desktop: wider label column */
.details-grid {
  grid-template-columns: 150px 1fr;
}

/* Mobile: slightly narrower but still readable */
@media (max-width: 820px) {
  .details-grid {
    grid-template-columns: 120px 1fr;
  }
}

    
  </style>
</head>

<body>
  <!-- Header matches your index menu style (logo + nav + | + My Product) -->
  <header class="topbar">
    <div class="brand">
      <a href="index.html" aria-label="Home">
        <img src="carhartt-logo.png" alt="Carhartt" />
      </a>
    </div>

    <nav class="menu">
      <a href="#">New</a>
      <a href="#">Featured</a>
      <a href="#">Men</a>
      <a href="#">Women</a>
      <a href="#">Kids</a>
      <a href="#">Scrubs</a>
      <a href="#">Boots</a>
      <a href="#">Accesories</a>
      <a href="#">Sale</a>
      <a href="#">Learn</a>

      <span class="menu-sep" aria-hidden="true">|</span>
      <a href="index.html">My Product</a>
    </nav>
  </header>

  <main class="product-wrap">
    <div class="product-layout">
      <!-- Info / Details -->
      <section class="card info-card">
        <h1 id="productTitle" class="title">Loading…</h1>
        <p id="productMeta" class="meta"></p>

        <h3 style="margin: 10px 0 8px;">Details</h3>
        <div class="details-grid">
          <div class="k">Materials:</div><div class="v" id="materials"></div>
          <div class="k">Care:</div><div class="v" id="care"></div>
          <div class="k">Country of Origin:</div><div class="v" id="coo"></div>
          <div class="k">Purchase Order:</div><div class="v" id="po"></div>
          <div class="k">Style:</div><div class="v" id="style"></div>
          <div class="k">Description:</div><div class="v" id="description"></div>
        </div>

        <p id="pageError" class="hidden"></p>
        <pre id="recordDump" class="hidden"></pre>
      </section>

      <!-- Image -->
      <aside class="card image-card">
        <img id="productImage" alt="Product image" />
      </aside>
    </div>
  </main>
</body>
</html>
``
