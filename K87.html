<main style="padding-top:72px; max-width: 980px; margin: 0 auto; padding-left:16px; padding-right:16px;">

  <link rel="stylesheet" href="styles.css">

  <!-- TOP HALF: Background image -->
  <section class="hero-top"></section>

  <!-- BOTTOM HALF: Your picture + all text -->
  <section class="hero-bottom">

    <h1 id="productTitle">Loading…</h1>
    <p id="productMeta"></p>

    <div style="display:flex; gap:24px; flex-wrap:wrap; align-items:flex-start; margin-top: 16px;">

      <!-- Product image -->
      <div style="flex: 0 0 320px; max-width: 100%;">
        <img id="K87" alt="Product image" style="width:100%; border-radius:6px; background:#f2f2f2;" />
        <img src="K87.png" alt="K87" class="bottom-image">
      </div>

      <!-- Details -->
      <div style="flex: 1 1 320px; min-width: 280px;">
        <h2>Details</h2>

        <div style="margin-top:12px;">
          <div><strong>Materials:</strong> <span id="materials"></span></div>
          <div><strong>Care:</strong> <span id="care"></span></div>
          <div><strong>COO:</strong> <span id="Coo"></span></div>
          <div><strong>PO:</strong> <span id="PO"></span></div>
          <div><strong>Style:</strong> <span id="Style"></span></div>
          <div><strong>Description:</strong> <span id="Description"></span></div>
        </div>

        <div style="margin-top:16px; font-size:0.95em; color:#444;">
          <div><strong>Record ID:</strong> <span id="productId"></span></div>
          <div><strong>Matched Key:</strong> <span id="productKey"></span></div>
        </div>
      </div>
    </div>

    <p id="pageError" class="hidden" style="margin-top: 16px; color:#b00020;"></p>

  </section>
</main>
